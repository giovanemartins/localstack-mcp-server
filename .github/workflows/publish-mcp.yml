name: Publish to MCP Registry

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for OIDC authentication
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Start LocalStack
        run: |
          docker run -d \
            --name localstack \
            -p 4566:4566 \
            -v /var/run/docker.sock:/var/run/docker.sock \
            localstack/localstack:latest
          echo "Waiting for LocalStack to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4566/_localstack/health > /dev/null 2>&1; then
              echo "LocalStack is ready"
              break
            fi
            echo "Attempt $i/30 - not ready yet..."
            sleep 3
          done

      # Publish underlying npm package:

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Sync version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          pnpm version "$VERSION" --no-git-tag-version
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' server.json > server.tmp && mv server.tmp server.json

      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm run --if-present test

      - name: Build package
        run: pnpm run --if-present build

      - name: Publish package to npm
        run: pnpm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Publish MCP server:

      - name: Install mcp-publisher
        run: |
          curl -L \
            "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Validate server.json
        run: ./mcp-publisher validate

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish
