name: Publish to MCP Registry

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for OIDC authentication
      contents: read

    services:
      localstack:
        image: localstack/localstack:latest
        ports:
          - 4566:4566
        options: >-
          --health-cmd "curl -f http://localhost:4566/_localstack/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # Publish underlying npm package:

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - name: Sync version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          pnpm version "$VERSION" --no-git-tag-version
          node -e "
            const fs = require('fs');
            const s = JSON.parse(fs.readFileSync('server.json', 'utf8'));
            s.version = '$VERSION';
            s.packages[0].version = '$VERSION';
            fs.writeFileSync('server.json', JSON.stringify(s, null, 2) + '\n');
          "

      - name: Install dependencies
        run: pnpm install

      - name: Run tests
        run: pnpm run --if-present test

      - name: Build package
        run: pnpm run --if-present build

      - name: Publish package to npm
        run: pnpm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Publish MCP server:

      - name: Install mcp-publisher
        run: |
          curl -L \
            "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish server to MCP Registry
        run: ./mcp-publisher publish
